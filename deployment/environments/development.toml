[metadata]
name = "development"
description = "Local development environment"
deployment_targets = ["local"]

[shared]
# Variables for local development
SITE_NAME = "lengedandungjoshua-dev"
SITE_DESCRIPTION = "Data Engineer & Chemical/Petroleum Technology Portfolio - Development"
ENVIRONMENT = "development"
ADMIN_EMAIL = "dev@localhost"
SECRET_KEY = "dev-secret-key-change-in-production"
ALGORITHM = "HS256"
ACCESS_TOKEN_EXPIRE_MINUTES = 30
MAX_UPLOAD_SIZE = 104857600
RATE_LIMIT_PER_MINUTE = 1000  # No limits for development

[shared.cloudflare_r2]
# Can use staging R2 or mock for development
R2_ACCOUNT_ID = "${R2_ACCOUNT_ID}"
R2_ACCESS_KEY_ID = "${R2_ACCESS_KEY_ID}"
R2_SECRET_ACCESS_KEY = "${R2_SECRET_ACCESS_KEY}"
R2_BUCKET_NAME = "lenge-dandung-joshua-dev"
R2_PUBLIC_URL = "http://localhost:9000"  # Local MinIO or localhost allowed

[shared.sentry]
SENTRY_DSN = ""  # Optional in development
SENTRY_ENVIRONMENT = "development"
SENTRY_TRACES_SAMPLE_RATE = 0.0
SENTRY_PROFILES_SAMPLE_RATE = 0.0

# Local development configuration
[targets.local]
SITE_URL = "http://localhost:3000"
NEXT_PUBLIC_SITE_URL = "http://localhost:3000"
NEXT_PUBLIC_API_URL = "http://localhost:8000"
CORS_ORIGINS = "http://localhost:3000,http://localhost:8000"
DATABASE_URL = "postgresql://postgres:postgres@localhost:5432/portfolio"
ADMIN_PASSWORD = "admin123"  # Default dev password

[targets.local.database]
DB_HOST = "localhost"
DB_PORT = 5432
DB_USER = "postgres"
DB_PASSWORD = "postgres"
DB_NAME = "portfolio"

[targets.local.redis]
REDIS_HOST = "localhost"
REDIS_PORT = 6379
REDIS_PASSWORD = ""  # No password for local Redis

# Validation rules (relaxed for development)
[validation]
required_vars = ["ADMIN_EMAIL"]
# No localhost restrictions in development
no_localhost_in = []
no_empty_in_production = []
https_required = []
