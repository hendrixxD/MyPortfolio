[metadata]
name = "production"
description = "Production environment for ldj.heistats.com"
deployment_targets = ["vercel", "docker", "cloudrun"]

[shared]
# Variables common across all deployment targets
SITE_NAME = "lengedandungjoshua"
SITE_DESCRIPTION = "Data Engineer & Chemical/Petroleum Technology Portfolio"
ENVIRONMENT = "production"
ADMIN_EMAIL = "lengedandungjoshua@gmail.com"
ADMIN_PASSWORD = "${ADMIN_PASSWORD}"  # Resolved from .secrets.toml
SECRET_KEY = "${SECRET_KEY}"  # Resolved from .secrets.toml
ALGORITHM = "HS256"
ACCESS_TOKEN_EXPIRE_MINUTES = 30
MAX_UPLOAD_SIZE = 104857600
RATE_LIMIT_PER_MINUTE = 60

[shared.cloudflare_r2]
R2_ACCOUNT_ID = "${R2_ACCOUNT_ID}"
R2_ACCESS_KEY_ID = "${R2_ACCESS_KEY_ID}"
R2_SECRET_ACCESS_KEY = "${R2_SECRET_ACCESS_KEY}"
R2_BUCKET_NAME = "lenge-dandung-joshua"
R2_PUBLIC_URL = "https://uploads.heistats.com"

[shared.sentry]
SENTRY_DSN = "${SENTRY_DSN}"
SENTRY_ENVIRONMENT = "production"
SENTRY_TRACES_SAMPLE_RATE = 0.1
SENTRY_PROFILES_SAMPLE_RATE = 0.1

# Vercel-specific configuration
[targets.vercel]
SITE_URL = "https://ldj.heistats.com"
NEXT_PUBLIC_SITE_URL = "https://ldj.heistats.com"
NEXT_PUBLIC_API_URL = ""  # Empty = same-origin API
CORS_ORIGINS = "https://ldj.heistats.com"
DATABASE_URL = "${NEON_DATABASE_URL}"  # Neon serverless PostgreSQL
REDIS_HOST = ""  # No Redis on Vercel - use in-memory fallback

[targets.vercel.build]
build_command = "cd frontend && npm run build"
output_directory = "frontend/.next"
install_command = "cd frontend && npm install"
framework = "nextjs"
python_runtime = "python3.12"

# Docker-specific configuration
[targets.docker]
SITE_URL = "https://ldj.heistats.com"
NEXT_PUBLIC_SITE_URL = "https://ldj.heistats.com"
NEXT_PUBLIC_API_URL = "https://api.ldj.heistats.com"
CORS_ORIGINS = "https://ldj.heistats.com,https://api.ldj.heistats.com"

[targets.docker.database]
DB_HOST = "portfolio_db"  # Container name
DB_PORT = 5432
DB_USER = "postgres"
DB_PASSWORD = "${POSTGRES_PASSWORD}"
DB_NAME = "portfolio"

[targets.docker.redis]
REDIS_HOST = "redis"  # Container name
REDIS_PORT = 6379
REDIS_PASSWORD = "${REDIS_PASSWORD}"

# Cloud Run-specific configuration
[targets.cloudrun]
SITE_URL = "https://ldj-cloudrun.heistats.com"
NEXT_PUBLIC_SITE_URL = "https://ldj-cloudrun.heistats.com"
NEXT_PUBLIC_API_URL = "https://api-cloudrun.heistats.com"
CORS_ORIGINS = "https://ldj-cloudrun.heistats.com"
DATABASE_URL = "${CLOUDSQL_DATABASE_URL}"
REDIS_HOST = ""  # No Redis - use in-memory

[targets.cloudrun.gcp]
GCP_PROJECT_ID = "${GCP_PROJECT_ID}"
GCP_REGION = "us-central1"
MIN_INSTANCES = 1
MAX_INSTANCES = 10
BACKEND_CPU = 2
BACKEND_MEMORY = "2Gi"
FRONTEND_CPU = 2
FRONTEND_MEMORY = "1Gi"

# Validation rules
[validation]
required_vars = [
    "SECRET_KEY", "ADMIN_EMAIL", "ADMIN_PASSWORD",
    "R2_ACCOUNT_ID", "R2_ACCESS_KEY_ID", "R2_SECRET_ACCESS_KEY"
]
no_localhost_in = ["SITE_URL", "NEXT_PUBLIC_SITE_URL", "CORS_ORIGINS", "R2_PUBLIC_URL"]
no_empty_in_production = ["ADMIN_PASSWORD", "SECRET_KEY", "DATABASE_URL"]
https_required = ["SITE_URL", "NEXT_PUBLIC_SITE_URL", "R2_PUBLIC_URL"]
