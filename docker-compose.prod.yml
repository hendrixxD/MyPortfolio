services:
  # Portfolio Database
  portfolio_db:
    image: postgres:15-alpine
    container_name: portfolio_db_prod
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USER}" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - portfolio_network

  redis:
    image: redis:7-alpine
    container_name: portfolio_redis_prod
    restart: unless-stopped
    env_file:
      - .env
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "--raw", "incr", "ping" ]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - portfolio_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: portfolio_backend_prod
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DB_HOST: portfolio_db
      DB_PORT: 5432
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      SECRET_KEY: ${SECRET_KEY}
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-30}
      CORS_ORIGINS: ${CORS_ORIGINS}
      UPLOAD_DIR: /app/uploads
      RATE_LIMIT_PER_MINUTE: ${RATE_LIMIT_PER_MINUTE:-60}
      SITE_NAME: ${SITE_NAME:-lengedandungjoshua}
      SITE_DESCRIPTION: ${SITE_DESCRIPTION:-Data Engineer & Chemical/Petroleum Technology Portfolio}
      SITE_URL: ${SITE_URL}
    volumes:
      - backend_uploads:/app/uploads
    expose:
      - "8000"
    depends_on:
      portfolio_db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 4
    networks:
      - portfolio_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
      network: host
    container_name: portfolio_frontend_prod
    restart: unless-stopped
    env_file:
      - .env
    dns:
      - 8.8.8.8
      - 8.8.4.4
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
      NEXT_PUBLIC_SITE_URL: ${SITE_URL}
      NODE_ENV: production
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - portfolio_network

  # Nginx Proxy Manager
  nginx-proxy-manager:
    image: 'jc21/nginx-proxy-manager:latest'
    container_name: nginx_proxy_manager
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - '80:80' # Public HTTP
      - '443:443' # Public HTTPS
      - '81:81' # Admin UI
    environment:
      TZ: "Africa/Lagos" # Adjust to your timezone
      DB_POSTGRES_HOST: 'npm_db'
      DB_POSTGRES_PORT: '5432'
      DB_POSTGRES_USER: 'npm'
      DB_POSTGRES_PASSWORD: 'npmpass'
      DB_POSTGRES_NAME: 'npm'
    volumes:
      - ./data:/data
      - ./letsencrypt:/etc/letsencrypt
      - backend_uploads:/var/www/uploads:ro # Access to backend uploads
    depends_on:
      - npm_db
      - frontend
      - backend
    networks:
      - portfolio_network

  # NPM Database
  npm_db:
    image: postgres:17
    container_name: npm_db
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_USER: 'npm'
      POSTGRES_PASSWORD: 'npmpass'
      POSTGRES_DB: 'npm'
    volumes:
      - npm_postgres_data:/var/lib/postgresql/data
    networks:
      - portfolio_network

volumes:
  postgres_data:
  redis_data:
  backend_uploads:
  npm_postgres_data:

networks:
  portfolio_network:
    driver: bridge
